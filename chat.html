<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Whisper Room</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#475569">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <style>
        /* Your existing CSS – unchanged */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #1e293b;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .status {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .message {
            background: #1e293b;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            max-width: 80%;
            align-self: flex-start;
            word-wrap: break-word;
        }
        .message.own {
            background: #3b82f6;
            align-self: flex-end;
        }
        .message-header {
            font-size: 0.75rem;
            color: #cbd5e1;
            margin-bottom: 0.25rem;
            display: flex;
            gap: 0.5rem;
        }
        .message-text {
            font-size: 0.95rem;
        }
        .message-file {
            margin-top: 0.5rem;
        }
        .message-file a {
            color: #90cdf4;
            text-decoration: none;
        }
        .input-area {
            background: #1e293b;
            padding: 1rem;
            border-top: 1px solid #334155;
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 2rem;
            padding: 0.75rem 1rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
        }
        #messageInput:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            padding: 0 1.25rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .file-label {
            background: #475569;
            border-radius: 2rem;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .file-label:hover {
            background: #64748b;
        }
        #fileInput {
            display: none;
        }
        .typing-indicator {
            font-size: 0.75rem;
            color: #94a3b8;
            padding: 0.25rem 1rem;
            font-style: italic;
        }
        @media (max-width: 640px) {
            .message {
                max-width: 90%;
            }
            .user-name {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="user-info">
            <div class="avatar" id="userAvatar">?</div>
            <div>
                <div class="user-name" id="userName">Connecting...</div>
                <div class="status" id="userStatus">● Connecting</div>
            </div>
        </div>
        <div>
            <button id="clearChatBtn" style="background:#ef4444; padding:0.5rem 1rem;">Clear Chat</button>
        </div>
    </div>
    <div class="messages-container" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <label class="file-label">
            📎
            <input type="file" id="fileInput">
        </label>
        <button id="sendBtn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // -------------------------------
        // DOM elements
        // -------------------------------
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const userNameSpan = document.getElementById('userName');
        const userAvatarSpan = document.getElementById('userAvatar');
        const userStatusSpan = document.getElementById('userStatus');
        const typingIndicator = document.getElementById('typingIndicator');
        const clearChatBtn = document.getElementById('clearChatBtn');

        let socket = null;
        let currentUserId = null;
        let userName = '';
        let userAvatar = '';
        let typingTimeout = null;

        // -------------------------------
        // Helper: show notification (browser push)
        // -------------------------------
        async function showNotificationIfNeeded(sender, text) {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') {
                new Notification(`Whisper Room – ${sender}`, { body: text, icon: '/icons/icon-192.png' });
            } else if (Notification.permission !== 'denied') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    new Notification(`Whisper Room – ${sender}`, { body: text, icon: '/icons/icon-192.png' });
                }
            }
        }

        // -------------------------------
        // Add message to DOM
        // -------------------------------
        function addMessage(msg) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (msg.userId === currentUserId) messageDiv.classList.add('own');
            messageDiv.setAttribute('data-message-id', msg.id || Date.now());

            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `<span>${escapeHtml(msg.userName)}</span><span>${new Date(msg.timestamp).toLocaleTimeString()}</span>`;
            messageDiv.appendChild(header);

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            if (msg.type === 'file' && msg.fileUrl) {
                const ext = msg.fileUrl.split('.').pop().toLowerCase();
                if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
                    textDiv.innerHTML = `<a href="${msg.fileUrl}" target="_blank"><img src="${msg.fileUrl}" style="max-width:200px; max-height:200px; border-radius:8px;"></a>`;
                } else {
                    textDiv.innerHTML = `<a href="${msg.fileUrl}" target="_blank">📎 Download file</a>`;
                }
            } else {
                textDiv.innerText = msg.text;
            }
            messageDiv.appendChild(textDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // -------------------------------
        // Load message history
        // -------------------------------
        function loadHistory() {
            fetch('/api/messages')
                .then(res => res.json())
                .then(messages => {
                    messagesDiv.innerHTML = '';
                    messages.forEach(msg => addMessage(msg));
                })
                .catch(console.error);
        }

        // -------------------------------
        // Socket.IO connection
        // -------------------------------
        function connectSocket() {
            socket = io();

            socket.on('connect', () => {
                userStatusSpan.textContent = '● Connected';
                userStatusSpan.style.color = '#22c55e';
                currentUserId = socket.id;
            });

            socket.on('identity', (data) => {
                userName = data.name;
                userAvatar = data.avatar;
                userNameSpan.textContent = userName;
                userAvatarSpan.textContent = userName.charAt(0).toUpperCase();
                document.title = `Whisper – ${userName}`;
            });

            socket.on('chat message', (msg) => {
                addMessage(msg);
                // Trigger notification if not own message
                if (msg.userId !== currentUserId) {
                    showNotificationIfNeeded(msg.userName, msg.text || 'sent a file');
                }
            });

            // FIX 1: System messages now trigger notifications
            socket.on('system message', (msg) => {
                addMessage(msg);
                // Trigger notification for system messages (admin broadcasts)
                if (msg.text && !msg.text.startsWith('User left') && !msg.text.startsWith('User joined')) {
                    showNotificationIfNeeded('System', msg.text);
                }
            });

            // FIX 2: Handle message deletion (purge) in real time
            socket.on('message deleted', (data) => {
                const targetMsg = document.querySelector(`.message[data-message-id="${data.id}"]`);
                if (targetMsg) targetMsg.remove();
                // Optionally reload history to re-sync
                loadHistory();
            });

            socket.on('typing', (data) => {
                if (data.userId !== currentUserId && data.isTyping) {
                    typingIndicator.textContent = `${data.userName} is typing...`;
                } else {
                    typingIndicator.textContent = '';
                }
            });

            socket.on('disconnect', () => {
                userStatusSpan.textContent = '● Disconnected';
                userStatusSpan.style.color = '#ef4444';
            });
        }

        // -------------------------------
        // Send message
        // -------------------------------
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            socket.emit('chat message', text);
            messageInput.value = '';
        }

        // -------------------------------
        // Send file
        // -------------------------------
        async function sendFile(file) {
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                alert('File too large (max 10MB)');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.url) {
                socket.emit('file message', data.url, file.name);
            } else {
                alert('Upload failed');
            }
        }

        // -------------------------------
        // Clear chat (local only)
        // -------------------------------
        function clearChat() {
            if (confirm('Clear all messages from your view only?')) {
                messagesDiv.innerHTML = '';
            }
        }

        // -------------------------------
        // Typing indicator
        // -------------------------------
        messageInput.addEventListener('input', () => {
            if (typingTimeout) clearTimeout(typingTimeout);
            socket.emit('typing', true);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', false);
            }, 1000);
        });

        // -------------------------------
        // Event listeners
        // -------------------------------
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) sendFile(e.target.files[0]);
            fileInput.value = '';
        });
        clearChatBtn.addEventListener('click', clearChat);

        // -------------------------------
        // Request notification permission on load
        // -------------------------------
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.error);
        }

        // Start the app
        connectSocket();
        loadHistory();
    </script>
</body>
</html>
