<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>whisper · unique names</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { background: #0a0c10; }
    .message-bubble {
      word-break: break-word;
      white-space: normal;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #3b3b5c; border-radius: 10px; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white flex flex-col h-screen">
  <div class="bg-black/40 backdrop-blur-sm border-b border-white/10 px-5 py-3">
    <h1 class="text-lg font-semibold tracking-wide">✧ whisper room ✧</h1>
    <p class="text-xs text-gray-400">your name and avatar appear here – they are unique and permanent</p>
  </div>
  <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
  <div class="border-t border-white/10 bg-black/30 p-3">
    <div class="flex gap-2 max-w-3xl mx-auto">
      <input type="text" id="messageInput" placeholder="type anything..." autocomplete="off"
             class="flex-1 px-4 py-3 rounded-xl bg-gray-900/80 border border-white/10 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-white">
      <button id="sendBtn" class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition font-medium shadow-lg">send</button>
    </div>
  </div>

  <script>
    const socket = io();
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let storedId = localStorage.getItem('whisper_user_id');
    socket.emit('identify', storedId, (data) => {
      console.log('Identity confirmed:', data.name);
      if (!storedId) localStorage.setItem('whisper_user_id', data.userId);
    });

    socket.emit('load history');
    socket.on('load messages', (msgs) => {
      messagesContainer.innerHTML = '';
      msgs.forEach(msg => appendMessage(msg.text, msg.timestamp, msg.senderName, msg.senderAvatar));
    });

    socket.on('chat message', (msg) => {
      appendMessage(msg.text, msg.timestamp, msg.senderName, msg.senderAvatar);
    });

    function appendMessage(text, timestamp, senderName, senderAvatar) {
      const div = document.createElement('div');
      div.className = 'flex justify-start items-start gap-3';

      // Avatar
      const avatarImg = document.createElement('img');
      avatarImg.src = senderAvatar;
      avatarImg.className = 'w-8 h-8 rounded-full object-cover flex-shrink-0 mt-1';
      avatarImg.alt = senderName;

      // Message content wrapper
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'max-w-[85%] sm:max-w-[32rem]';

      // Sender name
      const nameSpan = document.createElement('div');
      nameSpan.className = 'text-xs text-gray-400 mb-0.5';
      nameSpan.innerText = senderName;

      // Bubble
      const bubble = document.createElement('div');
      bubble.className = 'px-4 py-2 rounded-2xl bg-gray-800 text-gray-100 rounded-bl-none message-bubble';
      bubble.innerText = text;

      // Timestamp
      const timeSpan = document.createElement('div');
      timeSpan.className = 'text-[10px] mt-1 text-left text-gray-500';
      timeSpan.innerText = timestamp
        ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';

      contentWrapper.appendChild(nameSpan);
      contentWrapper.appendChild(bubble);
      contentWrapper.appendChild(timeSpan);
      div.appendChild(avatarImg);
      div.appendChild(contentWrapper);
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      socket.emit('chat message', { text });
      messageInput.value = '';
      messageInput.focus();
    }

    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
