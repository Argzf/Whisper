<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>contact · discord relay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full glass rounded-2xl p-8 shadow-2xl">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 mb-3">
        <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">send a message</h1>
      <p class="text-gray-400 text-sm mt-1">it goes straight to my Discord</p>
    </div>

    <form id="contactForm" class="space-y-4">
      <div>
        <input type="text" id="username" placeholder="your name (optional)" 
               class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/10 focus:border-indigo-500 focus:outline-none text-white placeholder-gray-500">
      </div>
      <div>
        <textarea id="message" rows="4" placeholder="what's on your mind?" 
                  class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/10 focus:border-indigo-500 focus:outline-none text-white placeholder-gray-500 resize-none"></textarea>
      </div>
      <button type="submit" id="submitBtn"
              class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 py-3 rounded-xl font-medium text-white transition shadow-lg">
        send message →
      </button>
      <div id="statusMessage" class="text-sm text-center mt-2"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const usernameInput = document.getElementById('username');
    const messageInput = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('statusMessage');
    let cooldownActive = false;

    function setStatus(text, isError = false) {
      statusDiv.textContent = text;
      statusDiv.className = `text-sm text-center mt-2 ${isError ? 'text-red-400' : 'text-emerald-400'}`;
      if (!isError) {
        setTimeout(() => { if (statusDiv.textContent === text) statusDiv.textContent = ''; }, 4000);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) {
        setStatus('✗ please write a message', true);
        return;
      }
      if (cooldownActive) {
        setStatus('⏳ please wait a few seconds before sending again', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'sending ...';

      try {
        const res = await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            message: message
          })
        });
        const data = await res.json();
        if (res.ok) {
          setStatus('✓ message sent!');
          messageInput.value = '';
          usernameInput.value = '';
          cooldownActive = true;
          setTimeout(() => { cooldownActive = false; }, 10000);
        } else {
          setStatus(data.error || '✗ failed to send', true);
        }
      } catch (err) {
        setStatus('✗ network error', true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'send message →';
      }
    });
  </script>
</body>
</html>
